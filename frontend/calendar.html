<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Календарь питания — CraftCook</title>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    .calendar-container {
      max-width: 900px;
      margin: 2rem auto;
      padding: 0 1.5rem;
    }

    .calendar-controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .calendar-controls button {
      background: var(--brown);
      color: var(--parch-light);
      border: none;
      padding: 0.6rem 1rem;
      border-radius: var(--radius);
      cursor: pointer;
      font-weight: 700;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .day-card {
      background: var(--parch-light);
      border: 3px solid var(--brown);
      border-radius: var(--radius);
      box-shadow: 4px 4px 0 var(--brown-mid);
      padding: 1rem;
    }

    .day-card-header {
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      color: var(--brown-dark);
      margin-bottom: 0.8rem;
      padding-bottom: 0.6rem;
      border-bottom: 2px solid var(--brown-mid);
    }

    .day-card-date {
      font-size: 11px;
      color: var(--brown-mid);
    }

    .day-meals {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .meal-slot {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: white;
      border: 2px solid var(--brown-mid);
      border-radius: var(--radius);
      padding: 0.6rem;
      font-size: 12px;
    }

    .meal-type { font-weight: 700; color: var(--brown-dark); }
    .meal-name { flex: 1; margin: 0 0.8rem; color: var(--brown-mid); }
    .meal-remove { background: none; border: none; color: #C0392B; cursor: pointer; }

    .day-card-add {
      background: var(--green-tag);
      color: white;
      border: none;
      border-radius: var(--radius);
      padding: 0.6rem;
      width: 100%;
      margin-top: 0.8rem;
      cursor: pointer;
      font-weight: 700;
    }

    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 999;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--parch-light);
      border: 3px solid var(--brown);
      border-radius: var(--radius);
      padding: 1.5rem;
      max-width: 400px;
      box-shadow: 8px 8px 0 var(--brown-dark);
    }

    .modal-label {
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      color: var(--brown-dark);
      margin-top: 1rem;
      margin-bottom: 0.4rem;
    }

    .modal-input {
      width: 100%;
      background: white;
      border: 2px solid var(--brown-mid);
      border-radius: var(--radius);
      padding: 0.6rem;
      font-size: 13px;
      box-sizing: border-box;
    }

    .recipe-options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.6rem;
      margin-bottom: 1rem;
    }

    .recipe-option {
      background: white;
      border: 2px solid var(--brown-mid);
      border-radius: var(--radius);
      padding: 0.8rem;
      cursor: pointer;
      text-align: center;
      transition: background 0.15s;
    }

    .recipe-option:hover { background: var(--parch-dark); }

    .modal-footer {
      display: flex;
      gap: 0.8rem;
      margin-top: 1rem;
    }

    .mc-btn { flex: 1; }

    @media (max-width: 768px) {
      .calendar-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <!-- HOTBAR NAV -->
  <nav class="hotbar">
    <div class="hotbar-logo">⚒ CRAFTCOOK</div>
    <div class="hotbar-links">
      <a href="./index.html"><span class="icon">🏠</span> Главная</a>
      <a href="./recipes.html"><span class="icon">📖</span> Рецепты</a>
      <a href="./notepad.html"><span class="icon">📝</span> Блокнот</a>
      <a href="./calendar.html" class="active"><span class="icon">📅</span> Календарь</a>
      <a href="./favorites.html"><span class="icon">☆</span> Избранное</a>
      <a href="./help.html"><span class="icon">❓</span></a>
    </div>
  </nav>

  <div class="calendar-container">
    <div class="calendar-controls">
      <button onclick="prevWeek()">← НАЗАД</button>
      <h2 class="section-title" style="margin: 0;">📅 МОЙ КАЛЕНДАРЬ</h2>
      <button onclick="nextWeek()">ВПЕРЁД →</button>
    </div>

    <div class="calendar-grid" id="calendar"></div>
  </div>

  <div class="modal-overlay" id="meal-modal">
    <div class="modal">
      <div class="modal-label">Выбери блюдо или напиши свой рецепт:</div>
      <div class="recipe-options" id="recipe-list">
        <div class="recipe-option" onclick="selectRecipe('🍕 Пицца с сыром', this)">🍕 Пицца с сыром</div>
        <div class="recipe-option" onclick="selectRecipe('🍣 Сет суши', this)">🍣 Сет суши</div>
        <div class="recipe-option" onclick="selectRecipe('🍲 Чечевичный суп', this)">🍲 Чечевичный суп</div>
        <div class="recipe-option" onclick="selectRecipe('🥗 Салат Цезарь', this)">🥗 Салат Цезарь</div>
        <div class="recipe-option" onclick="selectRecipe('🍖 Запечённые рёбра', this)">🍖 Запечённые рёбра</div>
        <div class="recipe-option" onclick="selectRecipe('🥘 Овощное карри', this)">🥘 Овощное карри</div>
      </div>
      <div class="modal-label">Или напиши своё:</div>
      <input class="modal-input" id="custom-meal" type="text" placeholder="Своё блюдо..."/>
      <div class="modal-footer">
        <button class="mc-btn secondary" onclick="closeModal()">ОТМЕНА</button>
        <button class="mc-btn primary" onclick="confirmMeal()">✔ ДОБАВИТЬ</button>
      </div>
    </div>
  </div>

  <footer class="mc-footer">⚒ CraftCook — 2026 · Сделано с ❤ и пикселями</footer>

  <script src="js/main.js"></script>
  <script>
    const DAYS = ['ПН', 'ВТ', 'СР', 'ЧТ', 'ПТ', 'СБ', 'ВС'];
    const DAYS_FULL = ['Понедельник', 'Вторник', 'Среда', 'Четверг', 'Пятница', 'Суббота', 'Воскресенье'];
    const MONTHS = ['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];

    let weekOffset = 0;
    let pendingDay = null;
    let selectedMealType = null;
    let selectedRecipe = null;
    let calendarData = JSON.parse(localStorage.getItem('craftcook-calendar') || '{}');

    function getWeekDates(offset) {
      const now = new Date();
      const day = now.getDay();
      const monday = new Date(now);
      monday.setDate(now.getDate() - (day === 0 ? 6 : day - 1) + offset * 7);
      return Array.from({ length: 7 }, (_, i) => {
        const d = new Date(monday);
        d.setDate(monday.getDate() + i);
        return d;
      });
    }

    function dateKey(date) {
      return date.toISOString().split('T')[0];
    }

    function isToday(date) {
      const t = new Date();
      return date.getDate() === t.getDate() && date.getMonth() === t.getMonth() && date.getFullYear() === t.getFullYear();
    }

    function renderCalendar() {
      const dates = getWeekDates(weekOffset);
      const grid = document.getElementById('calendar');
      grid.innerHTML = '';
      dates.forEach(d => {
        const key = dateKey(d);
        const meals = calendarData[key] || {};
        const card = document.createElement('div');
        card.className = 'day-card' + (isToday(d) ? ' today' : '');
        card.innerHTML = `
          <div class="day-card-header">
            ${DAYS[d.getDay() === 0 ? 6 : d.getDay() - 1]} <div class="day-card-date">${d.getDate()} ${MONTHS[d.getMonth()]}</div>
          </div>
          <div class="day-meals" id="meals-${key}">
            ${!meals.breakfast ? '' : `<div class="meal-slot"><span class="meal-type">🌅</span><span class="meal-name">${meals.breakfast}</span><button class="meal-remove" onclick="removeMeal('${key}', 'breakfast')">✕</button></div>`}
            ${!meals.lunch ? '' : `<div class="meal-slot"><span class="meal-type">🌞</span><span class="meal-name">${meals.lunch}</span><button class="meal-remove" onclick="removeMeal('${key}', 'lunch')">✕</button></div>`}
            ${!meals.dinner ? '' : `<div class="meal-slot"><span class="meal-type">🌙</span><span class="meal-name">${meals.dinner}</span><button class="meal-remove" onclick="removeMeal('${key}', 'dinner')">✕</button></div>`}
          </div>
          <button class="day-card-add" onclick="openMealModal('${key}')">+ ДОБАВИТЬ БЛЮДО</button>
        `;
        grid.appendChild(card);
      });
    }

    function openMealModal(dateKey) {
      pendingDay = dateKey;
      document.getElementById('meal-modal').classList.add('open');
      document.getElementById('custom-meal').value = '';
      selectedRecipe = null;
    }

    function closeModal() {
      document.getElementById('meal-modal').classList.remove('open');
      pendingDay = null;
      selectedRecipe = null;
    }

    function selectRecipe(recipe, el) {
      document.querySelectorAll('.recipe-option').forEach(e => e.style.background = '');
      el.style.background = var(--parch-dark);
      selectedRecipe = recipe;
    }

    function confirmMeal() {
      const custom = document.getElementById('custom-meal').value.trim();
      const meal = selectedRecipe || custom;
      if (!meal) {
        alert('Выбери блюдо или напиши своё!');
        return;
      }
      if (!calendarData[pendingDay]) calendarData[pendingDay] = {};
      const types = ['breakfast', 'lunch', 'dinner'];
      for (let type of types) {
        if (!calendarData[pendingDay][type]) {
          calendarData[pendingDay][type] = meal;
          break;
        }
      }
      localStorage.setItem('craftcook-calendar', JSON.stringify(calendarData));
      renderCalendar();
      closeModal();
    }

    function removeMeal(dateKey, type) {
      if (calendarData[dateKey]) delete calendarData[dateKey][type];
      localStorage.setItem('craftcook-calendar', JSON.stringify(calendarData));
      renderCalendar();
    }

    function prevWeek() {
      weekOffset--;
      renderCalendar();
    }

    function nextWeek() {
      weekOffset++;
      renderCalendar();
    }

    renderCalendar();
  </script>
</body>
</html>
