<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Блокнот — CraftCook</title>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    .notepad-layout {
      max-width: 1000px;
      margin: 2rem auto;
      padding: 0 1.5rem;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
    }

    .notepad-panel {
      background: var(--parch-light);
      border: 3px solid var(--brown);
      border-radius: var(--radius);
      box-shadow: 4px 4px 0 var(--brown-mid);
      overflow: hidden;
    }

    .notepad-panel-title {
      background: var(--brown-dark);
      color: var(--parch-light);
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      padding: 0.8rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .saved-badge {
      font-family: Arial, sans-serif;
      font-size: 11px;
      background: var(--green-tag);
      color: white;
      padding: 0.3rem 0.6rem;
      border-radius: 3px;
    }

    .notepad-body {
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }

    .free-textarea {
      width: 100%;
      min-height: 300px;
      background: white;
      border: 2px solid var(--brown-mid);
      border-radius: var(--radius);
      padding: 0.8rem;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      resize: vertical;
    }

    .notepad-meta {
      font-size: 12px;
      color: var(--brown-mid);
      text-align: right;
      font-weight: 600;
    }

    .checklist-input-row {
      display: flex;
      gap: 0.5rem;
    }

    .checklist-input {
      flex: 1;
      background: white;
      border: 2px solid var(--brown-mid);
      border-radius: var(--radius);
      padding: 0.6rem;
      font-size: 13px;
    }

    .add-btn {
      background: var(--green-tag);
      color: white;
      border: none;
      border-radius: var(--radius);
      padding: 0.6rem 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
    }

    .add-btn:hover { background: #2ecc71; }

    .checklist {
      background: white;
      border: 2px solid var(--brown-mid);
      border-radius: var(--radius);
      max-height: 250px;
      overflow-y: auto;
    }

    .checklist-empty {
      padding: 1rem;
      text-align: center;
      color: var(--brown-mid);
      font-size: 12px;
    }

    .checklist-item {
      display: flex;
      align-items: center;
      padding: 0.6rem;
      border-bottom: 1px solid #eee;
      gap: 0.6rem;
    }

    .checklist-item input {
      cursor: pointer;
      width: 18px;
      height: 18px;
    }

    .checklist-item-text {
      flex: 1;
      font-size: 13px;
      color: var(--brown-dark);
    }

    .checklist-item input:checked + .checklist-item-text {
      text-decoration: line-through;
      color: var(--brown-mid);
    }

    .checklist-item-delete {
      background: none;
      border: none;
      color: #C0392B;
      cursor: pointer;
      font-size: 14px;
    }

    .checklist-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.8rem;
      font-size: 12px;
      color: var(--brown-mid);
      font-weight: 700;
      border-top: 2px solid var(--brown-mid);
    }

    .clear-btn {
      background: #C0392B;
      color: white;
      border: none;
      border-radius: var(--radius);
      padding: 0.4rem 0.8rem;
      font-size: 11px;
      cursor: pointer;
    }

    @media (max-width: 768px) {
      .notepad-layout {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <!-- HOTBAR NAV -->
  <nav class="hotbar">
    <div class="hotbar-logo">⚒ CRAFTCOOK</div>
    <div class="hotbar-links">
      <a href="./index.html"><span class="icon">🏠</span> Главная</a>
      <a href="./recipes.html"><span class="icon">📖</span> Рецепты</a>
      <a href="./notepad.html" class="active"><span class="icon">📝</span> Блокнот</a>
      <a href="./calendar.html"><span class="icon">📅</span> Календарь</a>
      <a href="./favorites.html"><span class="icon">☆</span> Избранное</a>
      <a href="./help.html"><span class="icon">❓</span></a>
    </div>
  </nav>

  <div class="notepad-layout">

    <!-- СВОБОДНЫЙ ТЕКСТ -->
    <div class="notepad-panel">
      <div class="notepad-panel-title">
        📝 ЗАМЕТКИ
        <span id="note-saved" class="saved-badge">✔ сохранено</span>
      </div>
      <div class="notepad-body">
        <textarea
          class="free-textarea"
          id="free-note"
          placeholder="Пиши сюда что угодно — идеи блюд, заметки, список на неделю..."
        ></textarea>
        <div class="notepad-meta" id="note-chars">0 символов</div>
      </div>
    </div>

    <!-- СПИСОК ПОКУПОК -->
    <div class="notepad-panel">
      <div class="notepad-panel-title">
        🛒 СПИСОК ПОКУПОК
        <span id="list-saved" class="saved-badge">✔ сохранено</span>
      </div>
      <div class="notepad-body">

        <div class="checklist-input-row">
          <input
            class="checklist-input"
            id="new-item-input"
            type="text"
            placeholder="Добавить продукт..."
            maxlength="80"
          />
          <button class="add-btn" onclick="addItem()">+ ДОБАВИТЬ</button>
        </div>

        <div class="checklist" id="checklist">
          <div class="checklist-empty" id="checklist-empty">📦 Список пуст</div>
        </div>

        <div class="checklist-footer">
          <span id="list-counter">0 продуктов</span>
          <button class="clear-btn" onclick="clearChecked()">🗑 Удалить купленные</button>
        </div>

      </div>
    </div>

  </div>

  <footer class="mc-footer">⚒ CraftCook — 2026 · Сделано с ❤ и пикселями</footer>

  <script src="js/main.js"></script>
  <script>
    // ── ЗАМЕТКИ ──
    const noteTA = document.getElementById('free-note');
    const noteChars = document.getElementById('note-chars');
    const noteSaved = document.getElementById('note-saved');

    noteTA.value = localStorage.getItem('craftcook-note') || '';
    updateChars();

    noteTA.addEventListener('input', () => {
      updateChars();
      clearTimeout(noteTA._t);
      noteTA._t = setTimeout(() => {
        localStorage.setItem('craftcook-note', noteTA.value);
        showSaved(noteSaved);
      }, 600);
    });

    function updateChars() {
      noteChars.textContent = noteTA.value.length + ' символов';
    }

    // ── СПИСОК ПОКУПОК ──
    let items = JSON.parse(localStorage.getItem('craftcook-list') || '[]');
    renderList();

    document.getElementById('new-item-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') addItem();
    });

    function addItem() {
      const input = document.getElementById('new-item-input');
      const val = input.value.trim();
      if (!val) return;
      items.push({ text: val, checked: false });
      input.value = '';
      saveList();
      renderList();
    }

    function toggleItem(i) {
      items[i].checked = !items[i].checked;
      saveList();
      renderList();
    }

    function deleteItem(i) {
      items.splice(i, 1);
      saveList();
      renderList();
    }

    function clearChecked() {
      items = items.filter(x => !x.checked);
      saveList();
      renderList();
    }

    function saveList() {
      localStorage.setItem('craftcook-list', JSON.stringify(items));
      showSaved(document.getElementById('list-saved'));
    }

    function renderList() {
      const checklist = document.getElementById('checklist');
      const counter = document.getElementById('list-counter');
      checklist.innerHTML = '';
      if (items.length === 0) {
        checklist.innerHTML = '<div class="checklist-empty">📦 Список пуст</div>';
        counter.textContent = '0 продуктов';
        return;
      }
      items.forEach((item, i) => {
        const li = document.createElement('div');
        li.className = 'checklist-item';
        li.innerHTML = `
          <input type="checkbox" ${item.checked ? 'checked' : ''} onchange="toggleItem(${i})" />
          <span class="checklist-item-text">${item.text}</span>
          <button class="checklist-item-delete" onclick="deleteItem(${i})">✕</button>
        `;
        checklist.appendChild(li);
      });
      const checked = items.filter(x => x.checked).length;
      counter.textContent = `${items.length} продуктов (${checked} куплено)`;
    }

    function showSaved(el) {
      el.style.opacity = '1';
      clearTimeout(el._t);
      el._t = setTimeout(() => {
        el.style.opacity = '0.6';
      }, 1500);
    }
  </script>
</body>
</html>
