<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Рецепты — CraftCook</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

  <!-- HOTBAR -->
  <nav class="hotbar">
    <div class="hotbar-logo">⚒ CRAFTCOOK</div>
    <div class="hotbar-links">
      <a href="./index.html"><span class="icon">🏠</span> Главная</a>
      <a href="./recipes.html" class="active"><span class="icon">📖</span> Рецепты</a>
      <a href="./notepad.html"><span class="icon">📝</span> Блокнот</a>
      <a href="./calendar.html"><span class="icon">📅</span> Календарь</a>
      <a href="./favorites.html"><span class="icon">☆</span> Избранное</a>
      <a href="./help.html"><span class="icon">❓</span></a> 
    </div>
  </nav>

  <!-- FEED LAYOUT -->
  <div class="feed-layout">

    <!-- MAIN -->
    <div class="feed-main">

      <!-- Search + Create -->
      <div class="feed-top-row">
        <div class="search-bar" style="flex:1">
          <input type="text" id="search-input" placeholder="Найти рецепт..."/>
          <span class="search-icon">🔍</span>
        </div>
        <a href="recipe-new.html" class="mc-btn primary">+ СОЗДАТЬ РЕЦЕПТ</a>
      </div>

      <!-- Active filter label -->
      <div id="active-filter" style="display:none; font-size:14px; font-weight:700; color:var(--brown); display:flex; align-items:center; gap:0.5rem;">
        <span>Фильтр:</span>
        <span id="filter-label" class="tag green"></span>
        <button onclick="clearFilter()" style="background:none;border:none;cursor:pointer;font-size:16px;color:var(--brown)">✕</button>
      </div>

      <!-- Recipe list -->
      <div class="feed-list" id="feed-list">
        <!-- Рецепты загружаются здесь из API -->
      </div>

      <div id="no-results" style="display:none; text-align:center; padding:2rem; font-family:'Press Start 2P',monospace; font-size:10px; color:var(--brown-mid);">
        📦 Ничего не найдено
      </div>

      <div id="loading" style="text-align:center; padding:2rem; font-family:'Press Start 2P',monospace; font-size:12px; color:var(--brown-mid);">
        ⏳ Загрузка рецептов...
      </div>

    </div>

    <!-- SIDEBAR -->
    <aside class="sidebar">

      <div class="sidebar-panel">
        <div class="sidebar-panel-title">КАТЕГОРИИ</div>
        <div class="sidebar-list" id="categories">
          <!-- Теги загружаются здесь -->
        </div>
      </div>

      <div class="sidebar-panel">
        <div class="sidebar-panel-title">СОРТИРОВКА</div>
        <div class="sidebar-list">
          <button class="sidebar-item active" onclick="sortBy('popular', this)">По популярности</button>
          <button class="sidebar-item" onclick="sortBy('hard', this)">По сложности</button>
          <button class="sidebar-item" onclick="sortBy('fast', this)">По скорости готовки</button>
          <button class="sidebar-item" onclick="sortBy('random', this)">Случайно</button>
        </div>
      </div>

    </aside>
  </div>

  <footer class="mc-footer">⚒ CraftCook — 2026 · Сделано с ❤ и пикселями</footer>

  <script>
    let allRecipes = [];
    let activeFilter = null;
    const API_URL = 'http://localhost:8080/api';

    async function loadRecipes() {
      const loading = document.getElementById('loading');
      const feedList = document.getElementById('feed-list');
      
      try {
        loading.style.display = 'block';
        feedList.innerHTML = '';
        
        const response = await fetch(`${API_URL}/recipes`);
        if (!response.ok) throw new Error('Ошибка загрузки');
        
        allRecipes = await response.json();
        renderRecipes(allRecipes);
        loadTags();
        
        loading.style.display = 'none';
      } catch (error) {
        console.error('Ошибка загрузки рецептов:', error);
        loading.innerHTML = '❌ Ошибка загрузки рецептов. Проверьте подключение к серверу.';
      }
    }

    function renderRecipes(recipes) {
      const feedList = document.getElementById('feed-list');
      feedList.innerHTML = '';

      if (!recipes || recipes.length === 0) {
        document.getElementById('no-results').style.display = 'block';
        return;
      }

      document.getElementById('no-results').style.display = 'none';

      recipes.forEach(recipe => {
        const tagsString = (recipe.tags || []).join(',').toLowerCase();
        const difficultyEmoji = getDifficultyEmoji(recipe.difficulty);
        
        const card = document.createElement('a');
        card.href = `./recipe-detail.html?id=${recipe.id}`;
        card.className = 'feed-card';
        card.dataset.tags = tagsString;
        card.dataset.time = recipe.time || 0;
        card.dataset.difficulty = recipe.difficulty || '';
        
        card.innerHTML = `
          <div class="feed-card-img">${recipe.emoji || '🍽️'}</div>
          <div class="feed-card-body">
            <div class="feed-card-name">${recipe.title || 'Без названия'}</div>
            <div class="feed-card-tags">
              ${(recipe.tags || []).map(tag => `<span class="tag green">${tag}</span>`).join('')}
            </div>
            <div class="feed-card-meta">
              <span>⏱ ${recipe.time || 0} мин</span>
              <span>${difficultyEmoji} ${recipe.difficulty}</span>
              <span>👥 ${recipe.servings || 2}</span>
            </div>
          </div>
          <button class="feed-card-fav" onclick="toggleFav(event, this, ${recipe.id})">☆</button>
        `;
        
        feedList.appendChild(card);
      });
    }

    function getDifficultyEmoji(difficulty) {
      if (!difficulty) return '⭐';
      const diff = difficulty.toLowerCase();
      if (diff.includes('лёгк') || diff.includes('легк')) return '⭐';
      if (diff.includes('средн')) return '⭐⭐';
      if (diff.includes('сложн')) return '⭐⭐⭐';
      return '⭐';
    }

    async function loadTags() {
      try {
        const response = await fetch(`${API_URL}/tags`);
        if (!response.ok) throw new Error('Ошибка загрузки тегов');
        
        const tags = await response.json();
        renderTags(tags);
      } catch (error) {
        console.error('Ошибка загрузки тегов:', error);
      }
    }

    function renderTags(tags) {
      const categoriesDiv = document.getElementById('categories');
      categoriesDiv.innerHTML = '';

      if (!tags || tags.length === 0) {
        categoriesDiv.innerHTML = '<p>Нет доступных тегов</p>';
        return;
      }

      tags.forEach(tag => {
        const button = document.createElement('button');
        button.className = 'sidebar-item';
        button.textContent = tag.name;
        button.onclick = () => filterBy(tag.name, button);
        categoriesDiv.appendChild(button);
      });
    }

    function filterBy(tagName, button) {
      activeFilter = tagName;
      document.getElementById('active-filter').style.display = 'flex';
      document.getElementById('filter-label').textContent = tagName;

      document.querySelectorAll('#categories .sidebar-item').forEach(btn => {
        btn.classList.toggle('active', btn === button);
      });

      applyFilters();
    }

    function clearFilter() {
      activeFilter = null;
      document.getElementById('active-filter').style.display = 'none';
      document.querySelectorAll('#categories .sidebar-item').forEach(b => b.classList.remove('active'));
      applyFilters();
    }

    function applyFilters() {
      const q = document.getElementById('search-input').value.toLowerCase();
      const cards = document.querySelectorAll('#feed-list .feed-card');
      let visible = 0;
      
      cards.forEach(card => {
        const name = card.querySelector('.feed-card-name').textContent.toLowerCase();
        const tags = card.dataset.tags || '';
        const matchSearch = !q || name.includes(q) || tags.includes(q);
        const matchFilter = !activeFilter || tags.includes(activeFilter.toLowerCase());
        const show = matchSearch && matchFilter;
        
        card.style.display = show ? 'flex' : 'none';
        if (show) visible++;
      });
      
      document.getElementById('no-results').style.display = visible === 0 ? 'block' : 'none';
    }

    document.getElementById('search-input').addEventListener('input', applyFilters);

    function sortBy(type, btn) {
      document.querySelectorAll('.sidebar-panel')[1].querySelectorAll('.sidebar-item').forEach(b => {
        b.classList.remove('active');
      });
      btn.classList.add('active');

      const feedList = document.getElementById('feed-list');
      const cards = Array.from(document.querySelectorAll('#feed-list .feed-card'));

      switch(type) {
        case 'fast':
          cards.sort((a, b) => parseInt(a.dataset.time) - parseInt(b.dataset.time));
          break;
        case 'hard':
          cards.sort((a, b) => {
            const diffMap = {'лёгкий': 1, 'средний': 2, 'сложный': 3};
            return (diffMap[b.dataset.difficulty] || 0) - (diffMap[a.dataset.difficulty] || 0);
          });
          break;
        case 'random':
          for (let i = cards.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [cards[i], cards[j]] = [cards[j], cards[i]];
          }
          break;
        default:
          // popular - по умолчанию
          break;
      }

      feedList.innerHTML = '';
      cards.forEach(card => feedList.appendChild(card));
    }

    function toggleFav(e, btn, recipeId) {
      e.preventDefault();
      e.stopPropagation();
      
      const isFav = btn.textContent === '★';
      btn.textContent = isFav ? '☆' : '★';
      btn.style.color = isFav ? '' : '#E24B4A';
      
      const key = `favorite-${recipeId}`;
      if (isFav) {
        localStorage.removeItem(key);
      } else {
        localStorage.setItem(key, 'true');
      }
    }

    // Загрузить рецепты при открытии страницы
    window.addEventListener('load', loadRecipes);
  </script>

</body>
</html>
